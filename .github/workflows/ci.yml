name: CI Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  merge_group:
  workflow_dispatch:

jobs:
  build:
    runs-on: [self-hosted, linux, x64, day10]
    steps:
      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y gh jq unzip

      - name: Mark workspace as safe for git
        run: git config --global --add safe.directory '*'

      - name: Checkout claude-repo
        uses: actions/checkout@v4

      - name: Checkout opam-repository
        uses: actions/checkout@v4
        with:
          repository: ocaml/opam-repository
          path: opam-repository

      - name: Download previous results
        continue-on-error: true
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          mkdir -p previous-results
          run_id=$(gh run list --repo ${{ github.repository }} \
            --branch main --workflow "CI Build" --status completed \
            --json databaseId --jq "[.[] | select(.databaseId != ${{ github.run_id }})][0].databaseId // empty")
          if [ -n "$run_id" ]; then
            echo "Downloading results from run $run_id"
            gh run download "$run_id" --repo ${{ github.repository }} \
              --name build-results --dir previous-results
            echo "Downloaded $(ls previous-results/*.json 2>/dev/null | wc -l) result files"
          else
            echo "No previous run found"
          fi

      - name: Install day10
        run: |
          sudo curl -sL https://github.com/mtelvers/day10/releases/download/v0.0.1/day10-linux-x86_64 -o /usr/local/bin/day10
          sudo chmod +x /usr/local/bin/day10

      - name: List packages
        run: |
          day10 list \
            --opam-repository opam-repository \
            --opam-repository . \
            --ocaml-version ocaml.5.4.1 \
            --os-distribution ubuntu --os-family debian --os-version 24.04 \
            --json packages.json

      - name: Solve packages (dry-run)
        run: |
          mkdir -p results
          day10 health-check \
            --cache-dir /var/cache/day10 \
            --opam-repository opam-repository \
            --opam-repository . \
            --ocaml-version ocaml.5.4.1 \
            --os-distribution ubuntu --os-family debian --os-version 24.04 \
            --json results \
            --dry-run \
            --fork 256 \
            @packages.json

      - name: Filter solvable packages
        run: |
          jq -n --argjson pkgs "$(find results -name '*.json' -exec cat {} + | jq -s '[.[] | select(.status == "solution") | .name]')" \
            '{packages: $pkgs}' > solvable.json
          echo "Solvable: $(jq '.packages | length' solvable.json) / $(jq '.packages | length' packages.json)"

      - name: Build packages
        run: |
          day10 health-check \
            --cache-dir /var/cache/day10 \
            --opam-repository opam-repository \
            --opam-repository . \
            --ocaml-version ocaml.5.4.1 \
            --os-distribution ubuntu --os-family debian --os-version 24.04 \
            --json results \
            --fork 64 \
            @solvable.json

      - name: Generate summary
        id: summary
        if: always()
        run: |
          # Build current results index in a single jq pass
          find results -name '*.json' -exec cat {} + \
            | jq -s 'map({name, status, log: (.log // "" | split("\n") | .[-5:] | join(" "))})' \
            > /tmp/current.json

          # Build previous results index if available
          if ls previous-results/*.json 1>/dev/null 2>&1; then
            find previous-results -name '*.json' -exec cat {} + \
              | jq -s 'map({name, status}) | INDEX(.name)' > /tmp/previous.json
          else
            echo '{}' > /tmp/previous.json
          fi

          # Generate the full summary with a single jq invocation
          jq -r --slurpfile prev /tmp/previous.json '
            def counts: group_by(.status) | map({(.[0].status): length}) | add // {};
            def prev_status(name): ($prev[0][name].status // null);

            counts as $c |
            length as $total |
            ($c.success // 0) as $success |
            ($c.failure // 0) as $failed |
            ($c.no_solution // 0) as $no_solution |
            ($c.dependency_failed // 0) as $dep_failed |

            # Diff against previous
            [.[] | select(prev_status(.name) == "success" and .status != "success")
                 | "- `\(.name)` (success -> \(.status))"] as $broken |
            [.[] | select(prev_status(.name) != null and prev_status(.name) != "success" and .status == "success")
                 | "- `\(.name)` (\(prev_status(.name)) -> success)"] as $fixed |
            [.[] | select(prev_status(.name) == null)
                 | "- `\(.name)` (\(.status))"] as $added |
            [$prev[0] | to_entries[] | select(.key as $k | any(.[]; .name == $k) | not)
                 | "- `\(.key)` (was \(.value.status))"] as $removed |

            "## Build Results\n",
            "| Metric | Count |",
            "|--------|-------|",
            "| Total packages | \($total) |",
            "| :white_check_mark: Success | \($success) |",
            "| :x: Failed | \($failed) |",
            "| :warning: No solution | \($no_solution) |",
            "| :fast_forward: Dependency failed | \($dep_failed) |",
            "",
            (if $failed > 0 then
              "<details><summary>Failed packages (\($failed))</summary>\n",
              "| Package | Log (last 5 lines) |",
              "|---------|-----|",
              (.[] | select(.status == "failure")
                   | "| `\(.name)` | `\(.log | gsub("\\|"; "\\\\|"))` |"),
              "",
              "</details>"
            else empty end),
            "",
            (if ($prev[0] | length) > 0 then
              "## Changes from previous run\n",
              (if ($broken | length) > 0 then
                ":rotating_light: **Newly broken:**",
                $broken[],
                ""
              else empty end),
              (if ($fixed | length) > 0 then
                ":tada: **Newly fixed:**",
                $fixed[],
                ""
              else empty end),
              (if ($added | length) > 0 then
                ":new: **New packages:**",
                $added[],
                ""
              else empty end),
              (if ($removed | length) > 0 then
                ":wastebasket: **Removed packages:**",
                $removed[],
                ""
              else empty end),
              (if ($broken + $fixed + $added + $removed | length) == 0 then
                "No changes from previous run.",
                ""
              else empty end)
            else empty end),
            (if $success > 0 then
              "<details><summary>Successful packages (\($success))</summary>\n",
              (.[] | select(.status == "success") | "- `\(.name)`"),
              "",
              "</details>"
            else empty end)
          ' /tmp/current.json >> $GITHUB_STEP_SUMMARY

          # Export regression info for the gate step
          has_regressions=$(jq --slurpfile prev /tmp/previous.json '
            [.[] | select(($prev[0][.name].status // null) == "success" and .status != "success")]
            | if length > 0 then "true" else "false" end
          ' /tmp/current.json -r)
          echo "has_regressions=$has_regressions" >> $GITHUB_OUTPUT
          if [ "$has_regressions" = "true" ]; then
            jq -r --slurpfile prev /tmp/previous.json '
              [.[] | select(($prev[0][.name].status // null) == "success" and .status != "success")
                   | "- \(.name) (success -> \(.status))"] | .[]
            ' /tmp/current.json > /tmp/regressions.txt
          fi

      - name: Check for regressions
        if: github.event_name == 'merge_group' && steps.summary.outputs.has_regressions == 'true'
        run: |
          echo "::error::Regressions detected - the following packages broke:"
          cat /tmp/regressions.txt
          exit 1

      - name: Upload results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-results
          path: results/
